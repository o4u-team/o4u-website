[program:o4u-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php8.4 /opt/apps/o4u.nvnhan0810.com/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=8
redirect_stderr=true
stdout_logfile=/opt/apps/o4u.nvnhan0810.com/storage/logs/queue.log
stopwaitsecs=3600
